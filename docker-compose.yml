services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-cloud-bridge
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ./${OLLAMA_DATA_DIR:-ollama_data}:/root/.ollama:Z
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
